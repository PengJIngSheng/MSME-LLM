runtime:
  name: "Ubuntu cloud RTX 4090 48GB"

model:
  context_length: 32768

generation:
  max_new_tokens: 8192

server:
  host: "0.0.0.0"
  port: 8000
  public_site_url: "https://your-domain.example"
  timezone: "Asia/Shanghai"

database:
  mongodb:
    uri: "mongodb://mongo:27017/"
    database: "pepper_chat_db"
  pgvector:
    connection_uri: "postgresql+psycopg://postgres:postgres@pgvector:5432/pepper_memory"
    collection: "users_memory"

services:
  ollama:
    base_url: "http://ollama:11434"
    num_ctx_cap: 32768
    num_gpu: 99
    num_thread: 8

deployment:
  ssh:
    host: "your.server.ip"
    port: 22
    user: "ubuntu"
    identity_file: "~/.ssh/mof_server"
  docker:
    mongo_port: 27017
    pgvector_port: 5432
    ollama_port: 11434
    app_port: 8000
