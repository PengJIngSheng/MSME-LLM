<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Pepper Labs AI</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style.css?v=3.5.5">
</head>

<body>

    <div class="page-wrapper">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <a href="/" class="home-link" title="Home">
                    <img src="/static/MOF_Logo.png" alt="MOF" style="height: 36px; width: auto; object-fit: contain;"
                        class="company-logo-img">
                </a>
                <button class="icon-toggle-btn" id="sidebarCloseBtn" title="Close sidebar">
                    <i class="fa-solid fa-angles-left"></i>
                </button>
            </div>

            <div class="sidebar-nav-menu">
                <button class="nav-menu-btn active" title="Chat" id="newChatBtn"><i class="fa-solid fa-plus"></i> <span
                        class="nav-text">Chat</span></button>
                <button class="nav-menu-btn" title="Search History" id="openSearchModalBtn"><i
                        class="fa-solid fa-search"></i> <span class="nav-text">Search</span></button> <button
                    class="nav-menu-btn" title="AI Agent" id="agentModeBtn"><i class="fa-solid fa-cube"></i> <span
                        class="nav-text">Agent</span></button>
            </div>

            <div class="sidebar-content">
                <div class="history-dropdown-header" id="historyToggleBtn"><span class="nav-text">History</span> <i
                        class="fa-solid fa-chevron-down nav-text"></i></div>
                <ul class="history-list" id="historyList">
                    <li class="history-placeholder"><span class="nav-text">Loading history...</span></li>
                </ul>
            </div>
            <div class="sidebar-footer">
                <button class="icon-toggle-btn expand-btn hidden" id="sidebarExpandBtn" title="Expand sidebar">
                    <i class="fa-solid fa-angles-right"></i>
                </button>
                <div class="sidebar-user-container" id="userContainerWrap">
                    <button class="sidebar-user-btn" id="showLoginBtn">
                        <div class="user-avatar-mimic" id="avatarDisplay"></div>
                        <div class="user-info-text nav-text" style="text-align: left; line-height: 1.3; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex: 1;">
                            <div id="userDisplayName" style="font-weight:600; font-size:0.9rem;">Login</div>
                            <div id="userEmailDisplay" style="font-size:0.75rem; color:var(--primary-dim);"><span data-i18n="regLink">Register</span></div>
                        </div>
                    </button>
                    <!-- Expandable Context Menu -->
                    <div class="user-context-menu" id="userContextMenu">
                        <button class="ctx-menu-item" id="ctxSettingsMenuBtn">
                            <i class="fa-solid fa-gear"></i> <span data-i18n="settings" style="flex:1;">设置 / Settings</span> <i class="fa-solid fa-chevron-down" style="font-size: 0.7rem; width: auto;" id="ctxSettingsIcon"></i>
                        </button>
                        
                        <div class="ctx-settings-block" id="ctxSettingsBlock">
                            <div class="ctx-settings-header">Theme</div>
                            <div class="theme-toggle-group" id="ctxThemeToggleGroup">
                                <button class="theme-btn active" data-theme="light" title="Light"><i class="fa-solid fa-sun"></i></button>
                                <button class="theme-btn" data-theme="dark" title="Dark"><i class="fa-solid fa-moon"></i></button>
                            </div>
                            <div class="ctx-settings-header" style="margin-top:4px;">Language</div>
                            <div class="lang-selector" id="ctxLangSelector">
                                <button class="lang-btn active" data-lang="en">EN</button>
                                <button class="lang-btn" data-lang="zh">中文</button>
                                <button class="lang-btn" data-lang="ms">BM</button>
                            </div>
                        </div>

                        <button class="ctx-menu-item"><i class="fa-solid fa-file"></i> <span>文件 / Files</span></button>
                        <button class="ctx-menu-item"><i class="fa-solid fa-circle-question"></i> <span>帮助 / Help</span></button>
                        <div class="ctx-divider"></div>
                        <button class="ctx-menu-item text-danger" id="ctxLogoutBtn"><i class="fa-solid fa-arrow-right-from-bracket"></i> <span>退出登录 / Logout</span></button>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Workspace -->
        <div class="main-content">

            <header class="mobile-header" id="mobileHeader">
                <button class="icon-toggle-btn" id="sidebarOpenBtn" title="Open sidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <div class="mobile-logo-container">
                    <span class="mobile-logo-text">PEPPER LABS</span>
                </div>
                <div style="width: 32px"></div> <!-- Spacer -->
            </header>

            <div class="app-container centered-landing">

                <!-- Guest Navigation Bar (top-right, visible when not logged in) -->
                <nav class="guest-nav" id="guestNav">
                    <button class="guest-nav-gear" id="settingsGearBtn" title="Settings">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                    <button class="guest-nav-login" id="guestLoginBtn">登录</button>
                    <button class="guest-nav-register" id="guestRegisterBtn">注册</button>

                    <!-- Settings Dropdown Panel -->
                    <div class="settings-dropdown" id="settingsDropdown">
                        <div class="settings-section">
                            <div class="theme-toggle-group" id="themeToggleGroup">
                                <button class="theme-btn active" data-theme="light" title="Light">
                                    <i class="fa-solid fa-sun"></i>
                                </button>
                                <button class="theme-btn" data-theme="dark" title="Dark">
                                    <i class="fa-solid fa-moon"></i>
                                </button>
                            </div>
                        </div>
                        <div class="settings-divider"></div>
                        <div class="settings-section">
                            <span class="settings-label">语言</span>
                            <div class="lang-selector" id="langSelector">
                                <button class="lang-btn active" data-lang="en">EN</button>
                                <button class="lang-btn" data-lang="zh">中文</button>
                                <button class="lang-btn" data-lang="ms">BM</button>
                            </div>
                        </div>
                    </div>
                </nav>

                <main class="chat-area" id="chatArea">
                    <div class="greeting-container" id="logoContainer">
                        <h2>
                            <span class="logo-text">
                                <i class="fa-solid fa-leaf"></i> Ministry of Finance
                            </span><br />
                            How can I help you today?
                        </h2>
                    </div>
                    <div class="messages" id="messagesContainer"></div>
                </main>

                <!-- Two-row input bar -->
                <div class="input-wrapper">
                    <div class="liquid-glass-input">

                        <!-- Attachments preview bar -->
                        <div id="attachmentsPreview" class="attachments-preview"></div>

                        <div class="input-top-row">
                            <input type="text" id="userInput" placeholder="What do you want to know?"
                                autocomplete="off" />
                        </div>
                        <div class="input-bottom-row">
                            <div class="toggles-container">
                                <button class="toggle-switch" id="thinkToggle" title="Toggle Think Mode">
                                    <i class="fa-solid fa-brain" style="color:#d8b4e2;"></i> <span>Think Mode</span>
                                </button>
                                <button class="toggle-switch" id="webToggle" title="Toggle Search Mode">
                                    <i class="fa-solid fa-globe" style="color:#72bcd4;"></i> <span>Search Mode</span>
                                </button>
                            </div>
                            <div class="submit-group">
                                <input type="file" id="fileInput" multiple accept=".pdf,image/*,.txt"
                                    style="display: none;" />
                                <button class="icon-btn" title="Upload files" id="uploadBtn" style="display: none;">
                                    <i class="fa-solid fa-paperclip"></i>
                                </button>
                                <button class="submit-btn" id="submitBtn" title="Send (Enter)">
                                    <i class="fa-solid fa-arrow-up"></i>
                                </button>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Search History Modal -->
    <div class="modal-overlay" id="searchHistoryModal">
        <div class="modal-content liquid-glass-panel large-modal">
            <button class="modal-close" id="closeSearchModalBtn"><i class="fa-solid fa-xmark"></i></button>

            <div class="search-modal-top-bar">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="historySearchInput" placeholder="Search..." autocomplete="off">
            </div>
            <div class="search-modal-layout">
                <!-- Left Pane: Search & List -->
                <div class="search-sidebar">
                    <ul class="history-list history-search-list" id="modalHistoryList">
                        <!-- Populated dynamically via JS -->
                    </ul>
                </div>

                <!-- Right Pane: Live Preview -->
                <div class="search-preview-pane">
                    <div class="preview-empty-state" id="previewEmptyState">
                        Select a conversation to preview
                    </div>
                    <div class="preview-content hidden" id="previewContent">
                        <h3 class="preview-title" id="previewTitle"></h3>
                        <div class="preview-messages" id="previewMessages"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Math: KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
    <!-- Code: Prism.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/script.js?v=3.5.5"></script>
</body>

</html>
