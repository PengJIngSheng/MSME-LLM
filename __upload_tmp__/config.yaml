# =============================================================================
# Pepper Labs AI — Central Configuration File
# =============================================================================
# Edit this file to change models, API keys, and tuning parameters.
# NO need to touch any .py files for routine configuration changes.
# =============================================================================


# -----------------------------------------------------------------------------
# MODEL SETTINGS
# -----------------------------------------------------------------------------
model:
  # Ollama model name for THINK MODE (has <think>...</think> template)
  # This is the model registered via: ollama create <name> -f Modelfile
  think_model: "gemma4:31b-it-q4_K_M"

  # Ollama model name for STANDARD MODE (no <think> template, answers directly)
  # Registered via: ollama create <name> -f Modelfile_fast
  fast_model: "gemma4:31b-it-q4_K_M"

  # Lightweight model for web-search query planning only.
  # Leave empty to use fast_model.
  search_query_model: ""

  # Path to GGUF file (relative to project root, used only if NOT using Ollama)
  # Example: "./models/DeepSeek-R1-Distill-Qwen-14B-Q5_K_M.gguf"
  gguf_path: "./DeepSeek-R1-Distill-Qwen-14B-Q5_K_M.gguf"

  # Quantization mode when loading via HuggingFace (not used with Ollama)
  # Options: "fp16" | "8bit" | "4bit"
  quant_mode: "4bit"

  # Context window size (in tokens). Higher = can handle longer conversations + more search results.
  # RTX 4080 Laptop (12GB): 12288 is safe with Q5_K_M. More context = better think+web integration.
  context_length: 12288


# -----------------------------------------------------------------------------
# GENERATION PARAMETERS
# Change these to tune response quality, speed, and creativity.
# -----------------------------------------------------------------------------
generation:
  # Maximum tokens to generate per response.
  # 6144 = enough for detailed multi-section answers with analysis (RTX 4080 handles it fine).
  max_new_tokens: 6144

  # Creativity / randomness (0.0 = deterministic, 1.0 = very creative)
  # 0.6 = focused and factual while still natural. Good for research + reasoning.
  temperature: 0.6

  # Nucleus sampling: only consider tokens comprising the top P% of probability mass
  top_p: 0.95

  # Penalize repeated phrases (1.0 = no penalty, 1.1 = mild, 1.3 = strong)
  repetition_penalty: 1.05

  # Enable sampling (true = use temperature/top_p, false = greedy decoding)
  do_sample: true

  # Default think mode (true = model thinks before answering)
  default_think_mode: false


# -----------------------------------------------------------------------------
# SERVER SETTINGS
# -----------------------------------------------------------------------------
server:
  host: "0.0.0.0"
  port: 8000

  # Server timezone used for scheduling Google Workspace Calendar events
  timezone: "Asia/Kuala_Lumpur"

  # Number of conversation turns to keep in memory (per session)
  max_history_turns: 20


# -----------------------------------------------------------------------------
# API KEYS
# DuckDuckGo is used for web search — no API key required.
# Placeholder keys below are reserved for future integrations.
# -----------------------------------------------------------------------------
api_keys:
  # Reserved for future integrations:
  # openai: ""
  # anthropic: ""
  # google_search: ""


# -----------------------------------------------------------------------------
# WEB SEARCH SETTINGS
# -----------------------------------------------------------------------------
search:
  # Maximum number of search queries to generate per user question
  max_queries: 4

  # Maximum results to fetch per query (from DuckDuckGo or Bing)
  max_results_per_query: 8

  # Maximum number of final results passed to the model (after filtering & ranking)
  max_results_total: 12

  # How many characters of each result's body text to include
  snippet_length: 360

  # Domains to always exclude from search results (AI assistants, social media, etc.)
  blacklist_domains:
    - "kimi.ai"
    - "gemini.google.com"
    - "claude.ai"
    - "openai.com"
    - "anthropic.com"
    - "copilot.microsoft.com"
    - "chat.openai.com"
    - "github.com"
    - "stackoverflow.com"
    - "youtube.com"
    - "youtu.be"
    - "twitter.com"
    - "x.com"
    - "facebook.com"
    - "instagram.com"
    - "linkedin.com"
    - "tiktok.com"
    - "pinterest.com"
    - "google.com"
    - "bing.com"
    - "yahoo.com"
